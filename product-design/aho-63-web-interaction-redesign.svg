<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2200" viewBox="0 0 1800 2200">
  <defs>
    <style>
      .bg{fill:#f6f8f7}.ink{fill:#172124}.muted{fill:#667273}.panel{fill:#fff;stroke:#d9e1e2;stroke-width:2}.soft{fill:#eef4f3}.rail{fill:#f9fbfa;stroke:#d9e1e2;stroke-width:2}.accent{fill:#0f766e}.accent2{fill:#e8f7f5;stroke:#9bd6cf;stroke-width:2}.warn{fill:#fff7e6;stroke:#efc36d;stroke-width:2}.danger{fill:#fff1ef;stroke:#f0b4ad;stroke-width:2}.line{stroke:#d9e1e2;stroke-width:2}.sans{font-family:Inter,Arial,sans-serif}.mono{font-family:Menlo,Consolas,monospace}.title{font-size:42px;font-weight:800}.h2{font-size:27px;font-weight:800}.h3{font-size:20px;font-weight:800}.body{font-size:16px}.small{font-size:13px}.tiny{font-size:11px}.label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}.btn{fill:#0f766e}.btnText{fill:#fff;font-size:14px;font-weight:800}.ghost{fill:#fff;stroke:#cfdada;stroke-width:2}.ghostText{fill:#172124;font-size:14px;font-weight:800}
    </style>
  </defs>
  <rect class="bg" width="1800" height="2200"/>
  <text x="64" y="78" class="sans title ink">AHO-63 SecretManager Web Interaction Redesign</text>
  <text x="64" y="112" class="sans body muted">Goal: separate daily workbench, add/rotate, import, export, and audit so the UI no longer feels like one overloaded test console.</text>

  <g transform="translate(64,160)">
    <text x="0" y="0" class="sans h2 ink">1. Daily Workbench - first screen</text>
    <text x="0" y="32" class="sans body muted">Persistent shell: navigate projects/vaults, manage masked secrets, and keep trust context visible.</text>
    <rect x="0" y="58" width="1660" height="610" rx="10" class="panel"/>
    <rect x="0" y="58" width="250" height="610" rx="10" fill="#10191b"/>
    <text x="28" y="108" class="sans h3" fill="#eef7f7">SecretManager</text>
    <text x="28" y="134" class="sans small" fill="#a9b8ba">Local-first workspace</text>
    <rect x="24" y="178" width="202" height="42" rx="8" fill="#213133"/>
    <text x="44" y="204" class="sans small" fill="#eef7f7">Launch Validation</text>
    <rect x="24" y="230" width="202" height="42" rx="8" fill="#162225"/>
    <text x="44" y="256" class="sans small" fill="#cfe0e1">Customer Demo</text>
    <rect x="24" y="282" width="202" height="42" rx="8" fill="#162225"/>
    <text x="44" y="308" class="sans small" fill="#cfe0e1">Production API</text>
    <text x="28" y="604" class="sans small" fill="#a9b8ba">Values masked by default</text>

    <g transform="translate(282,94)">
      <text x="0" y="0" class="sans h2 ink">Customer Demo vault</text>
      <text x="0" y="28" class="sans body muted">staging · 6 secrets · last audit 2m ago</text>
      <rect x="712" y="-28" width="112" height="40" rx="8" class="ghost"/>
      <text x="742" y="-3" class="sans ghostText">Import</text>
      <rect x="838" y="-28" width="120" height="40" rx="8" class="btn"/>
      <text x="862" y="-3" class="sans btnText">Add secret</text>

      <rect x="0" y="72" width="958" height="392" rx="8" class="panel"/>
      <rect x="0" y="72" width="958" height="44" rx="8" class="soft"/>
      <text x="22" y="100" class="sans label muted">Key</text>
      <text x="308" y="100" class="sans label muted">Env</text>
      <text x="420" y="100" class="sans label muted">Value</text>
      <text x="650" y="100" class="sans label muted">Updated</text>
      <text x="808" y="100" class="sans label muted">Actions</text>
      <line x1="0" y1="116" x2="958" y2="116" class="line"/>
      <g class="sans body ink">
        <text x="22" y="154" class="mono body">STRIPE_API_KEY</text><text x="308" y="154">staging</text><text x="420" y="154" class="mono">••••••••••••</text><text x="650" y="154">2m ago</text><text x="808" y="154">Copy  Reveal  Rotate</text>
        <line x1="0" y1="174" x2="958" y2="174" class="line"/>
        <text x="22" y="212" class="mono body">DATABASE_URL</text><text x="308" y="212">staging</text><text x="420" y="212" class="mono">••••••••••••</text><text x="650" y="212">12m ago</text><text x="808" y="212">Copy  Reveal  Rotate</text>
        <line x1="0" y1="232" x2="958" y2="232" class="line"/>
        <text x="22" y="270" class="mono body">NEXTAUTH_SECRET</text><text x="308" y="270">staging</text><text x="420" y="270" class="mono">••••••••••••</text><text x="650" y="270">1h ago</text><text x="808" y="270">Copy  Reveal  Rotate</text>
        <line x1="0" y1="290" x2="958" y2="290" class="line"/>
        <text x="22" y="328" class="mono body">SENTRY_DSN</text><text x="308" y="328">staging</text><text x="420" y="328" class="mono">••••••••••••</text><text x="650" y="328">1h ago</text><text x="808" y="328">Copy  Reveal  Rotate</text>
      </g>
    </g>

    <g transform="translate(1280,94)">
      <rect x="0" y="0" width="320" height="530" rx="8" class="rail"/>
      <text x="22" y="38" class="sans h3 ink">Vault health</text>
      <rect x="22" y="62" width="136" height="28" rx="14" class="accent2"/>
      <text x="42" y="82" class="sans small ink">Screenshot safe</text>
      <text x="22" y="128" class="sans label muted">Selected secret</text>
      <text x="22" y="158" class="mono body ink">STRIPE_API_KEY</text>
      <text x="22" y="186" class="sans small muted">Version 4 · rotated by demo@37a.home</text>
      <line x1="22" y1="224" x2="298" y2="224" class="line"/>
      <text x="22" y="262" class="sans h3 ink">Recent audit</text>
      <text x="22" y="300" class="sans small muted">copy · STRIPE_API_KEY · 2m</text>
      <text x="22" y="332" class="sans small muted">rotate · DATABASE_URL · 12m</text>
      <text x="22" y="364" class="sans small muted">import · 3 created · 22m</text>
      <text x="22" y="396" class="sans small muted">export warning · 1h</text>
    </g>
  </g>

  <g transform="translate(64,900)">
    <text x="0" y="0" class="sans h2 ink">2. Add / Rotate drawer</text>
    <text x="0" y="32" class="sans body muted">Creation and rotation are focused transient states, not permanent page sections.</text>
    <rect x="0" y="58" width="780" height="430" rx="10" class="panel"/>
    <rect x="480" y="58" width="300" height="430" rx="10" class="rail"/>
    <text x="24" y="106" class="sans h3 ink">Table stays visible behind drawer</text>
    <line x1="24" y1="148" x2="438" y2="148" class="line"/>
    <line x1="24" y1="198" x2="438" y2="198" class="line"/>
    <line x1="24" y1="248" x2="438" y2="248" class="line"/>
    <text x="510" y="108" class="sans h3 ink">Rotate secret</text>
    <text x="510" y="138" class="sans small muted">STRIPE_API_KEY · staging</text>
    <rect x="510" y="172" width="240" height="38" rx="8" class="panel"/>
    <text x="526" y="196" class="sans small muted">New value</text>
    <rect x="510" y="224" width="240" height="72" rx="8" class="panel"/>
    <text x="526" y="250" class="sans small muted">Description</text>
    <rect x="510" y="316" width="118" height="40" rx="8" class="ghost"/>
    <text x="548" y="341" class="sans ghostText">Cancel</text>
    <rect x="640" y="316" width="110" height="40" rx="8" class="btn"/>
    <text x="658" y="341" class="sans btnText">Rotate</text>

    <g transform="translate(880,58)">
      <rect x="0" y="0" width="780" height="430" rx="10" class="panel"/>
      <text x="24" y="50" class="sans h3 ink">Conflict state</text>
      <rect x="24" y="78" width="720" height="86" rx="8" class="danger"/>
      <text x="48" y="112" class="sans body ink">Duplicate key in staging</text>
      <text x="48" y="140" class="sans small muted">Resolve before saving. Existing value remains masked.</text>
      <rect x="24" y="204" width="230" height="40" rx="8" class="ghost"/>
      <text x="54" y="229" class="sans ghostText">Keep existing</text>
      <rect x="270" y="204" width="230" height="40" rx="8" class="btn"/>
      <text x="306" y="229" class="sans btnText">Create alternate key</text>
    </g>
  </g>

  <g transform="translate(64,1480)">
    <text x="0" y="0" class="sans h2 ink">3. Import wizard and export warning</text>
    <text x="0" y="32" class="sans body muted">High-risk transfer flows become focused review steps with masked previews and explicit confirmation.</text>
    <rect x="0" y="58" width="800" height="500" rx="10" class="panel"/>
    <text x="28" y="108" class="sans h3 ink">Import .env preview</text>
    <text x="28" y="138" class="sans small muted">Step 2 of 3 · Values stay masked before apply.</text>
    <rect x="28" y="178" width="744" height="52" rx="8" class="accent2"/>
    <text x="52" y="211" class="sans body ink">3 valid · 1 duplicate · 1 invalid</text>
    <g class="sans body ink">
      <rect x="28" y="258" width="744" height="42" rx="6" class="soft"/><text x="50" y="285" class="mono">DATABASE_URL</text><text x="318" y="285" class="mono">••••••••</text><text x="580" y="285">valid</text>
      <rect x="28" y="310" width="744" height="42" rx="6" class="warn"/><text x="50" y="337" class="mono">STRIPE_API_KEY</text><text x="318" y="337" class="mono">••••••••</text><text x="580" y="337">duplicate</text>
      <rect x="28" y="362" width="744" height="42" rx="6" class="danger"/><text x="50" y="389" class="mono">BAD LINE</text><text x="318" y="389">not parsed</text><text x="580" y="389">invalid</text>
    </g>
    <rect x="520" y="430" width="110" height="40" rx="8" class="ghost"/>
    <text x="552" y="455" class="sans ghostText">Back</text>
    <rect x="646" y="430" width="126" height="40" rx="8" class="btn"/>
    <text x="672" y="455" class="sans btnText">Apply import</text>

    <g transform="translate(860,58)">
      <rect x="0" y="0" width="800" height="500" rx="10" class="panel"/>
      <text x="28" y="50" class="sans h3 ink">Plaintext export warning</text>
      <text x="28" y="80" class="sans small muted">Encrypted backup is the default; plaintext requires explicit confirmation.</text>
      <rect x="28" y="122" width="744" height="132" rx="8" class="warn"/>
      <text x="54" y="160" class="sans body ink">Plaintext .env files can leak secrets.</text>
      <text x="54" y="192" class="sans small muted">Do not paste exported files into issues, chat, docs, or screenshots.</text>
      <text x="54" y="224" class="sans small muted">This action creates an audit event.</text>
      <rect x="28" y="296" width="360" height="72" rx="8" class="accent2"/>
      <text x="52" y="326" class="sans body ink">Recommended: encrypted backup</text>
      <text x="52" y="350" class="sans small muted">No plaintext output shown in browser.</text>
      <rect x="420" y="296" width="352" height="72" rx="8" class="danger"/>
      <text x="444" y="326" class="sans body ink">Plaintext .env</text>
      <text x="444" y="350" class="sans small muted">Requires confirmation and screenshot-safe off.</text>
      <rect x="548" y="430" width="224" height="40" rx="8" class="btn"/>
      <text x="584" y="455" class="sans btnText">Confirm plaintext risk</text>
    </g>
  </g>
</svg>
