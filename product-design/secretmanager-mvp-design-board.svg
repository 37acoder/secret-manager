<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2600" viewBox="0 0 1800 2600">
  <defs>
    <style>
      .bg{fill:#f6f7f4}.panel{fill:#ffffff;stroke:#d9ded8;stroke-width:2}.soft{fill:#f0f4ef}.ink{fill:#17201b}.muted{fill:#69736d}.line{stroke:#d9ded8;stroke-width:2}.accent{fill:#176b58}.blue{fill:#2f5f9f}.warn{fill:#b76b18}.danger{fill:#aa3d3d}.ok{fill:#2f7b55}.chip{fill:#e7efe9;stroke:#c9d8cf}.mono{font-family:Menlo,Consolas,monospace}.sans{font-family:Inter,Arial,sans-serif}.title{font-size:42px;font-weight:700}.h2{font-size:26px;font-weight:700}.h3{font-size:19px;font-weight:700}.body{font-size:16px}.small{font-size:13px}.tiny{font-size:11px}.btn{fill:#176b58}.btn2{fill:#eef3ef;stroke:#cfd9d2}.redsoft{fill:#f7ece8;stroke:#e4b9aa}.yellowsoft{fill:#fff4dc;stroke:#e5c47d}.bluesoft{fill:#eaf1fb;stroke:#c6d7ee}
    </style>
  </defs>
  <rect class="bg" width="1800" height="2600"/>
  <text x="64" y="82" class="sans title ink">SecretManager MVP Product Design Board</text>
  <text x="64" y="116" class="sans body muted">Selected direction: Calm Security Workbench. All values masked; demo keys only.</text>

  <g transform="translate(64,160)">
    <text class="sans h2 ink" x="0" y="0">Visual Direction Comparison</text>
    <g transform="translate(0,28)">
      <rect class="panel" width="520" height="260" rx="8"/>
      <text class="sans h3 ink" x="28" y="42">1. Calm Security Workbench</text>
      <text class="sans small muted" x="28" y="70">Selected: stable MVP layout, dense but readable.</text>
      <rect x="28" y="96" width="120" height="126" class="soft" rx="6"/>
      <rect x="166" y="96" width="194" height="126" fill="#fbfcfa" stroke="#d9ded8" rx="6"/>
      <rect x="378" y="96" width="114" height="126" class="soft" rx="6"/>
      <line x1="188" y1="126" x2="338" y2="126" class="line"/>
      <line x1="188" y1="156" x2="338" y2="156" class="line"/>
      <line x1="188" y1="186" x2="338" y2="186" class="line"/>
      <circle cx="62" cy="126" r="8" class="accent"/>
      <circle cx="62" cy="156" r="8" class="ok"/>
      <circle cx="62" cy="186" r="8" class="blue"/>
    </g>
    <g transform="translate(576,28)">
      <rect class="panel" width="520" height="260" rx="8"/>
      <text class="sans h3 ink" x="28" y="42">2. Developer Command Center</text>
      <text class="sans small muted" x="28" y="70">Useful, but command expectations exceed MVP.</text>
      <rect x="28" y="96" width="464" height="38" fill="#1f2622" rx="6"/>
      <text x="46" y="120" class="mono small" fill="#dbe8df">/ import .env into prototype-api</text>
      <rect x="28" y="152" width="220" height="70" fill="#fbfcfa" stroke="#d9ded8" rx="6"/>
      <rect x="272" y="152" width="220" height="70" fill="#fbfcfa" stroke="#d9ded8" rx="6"/>
      <line x1="52" y1="178" x2="224" y2="178" class="line"/>
      <line x1="296" y1="178" x2="468" y2="178" class="line"/>
      <line x1="52" y1="202" x2="192" y2="202" class="line"/>
    </g>
    <g transform="translate(1152,28)">
      <rect class="panel" width="520" height="260" rx="8"/>
      <text class="sans h3 ink" x="28" y="42">3. Audit-First Trust Dashboard</text>
      <text class="sans small muted" x="28" y="70">Strong trust story, less direct for CRUD learning.</text>
      <rect x="28" y="96" width="150" height="126" class="bluesoft" rx="6"/>
      <rect x="200" y="96" width="138" height="126" class="soft" rx="6"/>
      <rect x="360" y="96" width="132" height="126" class="yellowsoft" rx="6"/>
      <circle cx="76" cy="142" r="24" class="ok"/>
      <line x1="224" y1="126" x2="316" y2="126" class="line"/>
      <line x1="224" y1="156" x2="316" y2="156" class="line"/>
      <line x1="384" y1="126" x2="468" y2="126" class="line"/>
    </g>
  </g>

  <g transform="translate(64,520)">
    <text class="sans h2 ink" x="0" y="0">Selected Screen System</text>
    <text class="sans body muted" x="0" y="28">Left navigation + central workbench + right trust/activity rail. Product UI first; no landing hero.</text>
  </g>

  <g transform="translate(64,590)">
    <rect class="panel" width="800" height="420" rx="10"/>
    <rect width="800" height="54" fill="#fbfcfa" stroke="#d9ded8" rx="10"/>
    <text x="24" y="35" class="sans h3 ink">Empty Projects</text>
    <text x="640" y="35" class="sans small muted">Local vaults</text>
    <rect x="24" y="76" width="180" height="320" fill="#f0f4ef"/>
    <text x="48" y="116" class="sans small muted">Projects</text>
    <rect x="48" y="144" width="112" height="32" class="btn2" rx="6"/>
    <text x="62" y="165" class="sans small ink">No projects</text>
    <rect x="240" y="112" width="560" height="240" fill="#fbfcfa"/>
    <text x="314" y="168" class="sans h2 ink">Create your first project vault</text>
    <text x="314" y="202" class="sans body muted">Store prototype secrets in a local-first workspace.</text>
    <rect x="314" y="234" width="146" height="44" class="btn" rx="7"/>
    <text x="338" y="262" class="sans body" fill="#fff">Create project</text>
    <rect x="476" y="234" width="126" height="44" class="btn2" rx="7"/>
    <text x="501" y="262" class="sans body ink">Import .env</text>
    <text x="314" y="316" class="sans small muted">Screenshot-safe demo mode uses fake secrets only.</text>
  </g>

  <g transform="translate(936,590)">
    <rect class="panel" width="800" height="420" rx="10"/>
    <rect width="800" height="54" fill="#fbfcfa" stroke="#d9ded8" rx="10"/>
    <text x="24" y="35" class="sans h3 ink">Project Detail With Masked Secrets</text>
    <rect x="24" y="76" width="150" height="320" fill="#f0f4ef"/>
    <text x="44" y="112" class="sans small muted">Prototype API</text>
    <text x="44" y="144" class="sans small ink">Webhooks Demo</text>
    <text x="44" y="176" class="sans small ink">Landing Site</text>
    <rect x="200" y="78" width="382" height="318" fill="#fff"/>
    <text x="200" y="106" class="sans h3 ink">Prototype API</text>
    <text x="200" y="132" class="sans small muted">6 secrets - local vault unlocked</text>
    <line x1="200" y1="158" x2="582" y2="158" class="line"/>
    <text x="214" y="184" class="sans tiny muted">KEY</text><text x="392" y="184" class="sans tiny muted">VALUE</text><text x="512" y="184" class="sans tiny muted">ACTIONS</text>
    <text x="214" y="218" class="mono small ink">STRIPE_API_KEY</text><text x="392" y="218" class="mono small muted">••••••••••••••</text><text x="514" y="218" class="sans small accent">Copy Reveal</text>
    <line x1="200" y1="238" x2="582" y2="238" class="line"/>
    <text x="214" y="268" class="mono small ink">DATABASE_URL</text><text x="392" y="268" class="mono small muted">••••••••••••••</text><text x="514" y="268" class="sans small accent">Copy Reveal</text>
    <line x1="200" y1="288" x2="582" y2="288" class="line"/>
    <text x="214" y="318" class="mono small ink">REDIS_URL</text><text x="392" y="318" class="mono small muted">••••••••••••••</text><text x="514" y="318" class="sans small accent">Copy Reveal</text>
    <rect x="612" y="76" width="164" height="320" class="soft" rx="8"/>
    <text x="632" y="112" class="sans h3 ink">Activity</text>
    <text x="632" y="148" class="sans small muted">Copied DATABASE_URL</text>
    <text x="632" y="178" class="sans small muted">Imported 4 keys</text>
    <text x="632" y="208" class="sans small muted">Updated REDIS_URL</text>
    <rect x="632" y="314" width="104" height="34" class="btn2" rx="6"/>
    <text x="650" y="336" class="sans small ink">View audit</text>
  </g>

  <g transform="translate(64,1070)">
    <rect class="panel" width="800" height="420" rx="10"/>
    <text x="24" y="38" class="sans h3 ink">Add / Edit Secret Drawer</text>
    <rect x="24" y="70" width="440" height="326" fill="#fbfcfa"/>
    <text x="52" y="118" class="sans h2 ink">Prototype API</text>
    <line x1="52" y1="154" x2="420" y2="154" class="line"/>
    <text x="52" y="194" class="mono small ink">NEXTAUTH_SECRET</text><text x="250" y="194" class="mono small muted">••••••••••••</text>
    <text x="52" y="238" class="mono small ink">SENTRY_DSN</text><text x="250" y="238" class="mono small muted">••••••••••••</text>
    <rect x="490" y="0" width="310" height="420" fill="#ffffff" stroke="#cfd9d2" rx="10"/>
    <text x="516" y="50" class="sans h3 ink">Rotate secret</text>
    <text x="516" y="82" class="sans small muted">Existing values stay masked in the table.</text>
    <text x="516" y="124" class="sans small muted">Key</text><rect x="516" y="136" width="238" height="38" class="btn2" rx="6"/><text x="530" y="160" class="mono small ink">SENTRY_DSN</text>
    <text x="516" y="204" class="sans small muted">Environment</text><rect x="516" y="216" width="238" height="38" class="btn2" rx="6"/><text x="530" y="240" class="sans small ink">Production</text>
    <text x="516" y="284" class="sans small muted">New value</text><rect x="516" y="296" width="238" height="38" class="btn2" rx="6"/><text x="530" y="320" class="mono small muted">••••••••••••••••</text>
    <rect x="516" y="356" width="102" height="38" class="btn" rx="6"/><text x="538" y="380" class="sans small" fill="#fff">Save</text>
    <text x="636" y="380" class="sans small muted">Records audit event</text>
  </g>

  <g transform="translate(936,1070)">
    <rect class="panel" width="800" height="420" rx="10"/>
    <text x="24" y="38" class="sans h3 ink">Import Preview / Conflict</text>
    <rect x="24" y="70" width="360" height="326" fill="#1f2622" rx="8"/>
    <text x="48" y="108" class="mono small" fill="#dbe8df">STRIPE_API_KEY=••••••••••</text>
    <text x="48" y="142" class="mono small" fill="#dbe8df">DATABASE_URL=••••••••••</text>
    <text x="48" y="176" class="mono small" fill="#dbe8df">REDIS_URL=••••••••••</text>
    <text x="48" y="210" class="mono small" fill="#e0b06a">INVALID LINE 7</text>
    <text x="48" y="244" class="mono small" fill="#dbe8df">SENTRY_DSN=••••••••••</text>
    <rect x="420" y="70" width="340" height="326" fill="#fbfcfa"/>
    <text x="444" y="108" class="sans small muted">Preview before import</text>
    <text x="444" y="146" class="mono small ink">STRIPE_API_KEY</text><text x="630" y="146" class="sans small ok">New</text>
    <text x="444" y="184" class="mono small ink">DATABASE_URL</text><text x="630" y="184" class="sans small warn">Conflict</text>
    <rect x="444" y="204" width="94" height="32" class="yellowsoft" rx="6"/><text x="462" y="225" class="sans small ink">Overwrite</text>
    <rect x="548" y="204" width="64" height="32" class="btn2" rx="6"/><text x="568" y="225" class="sans small ink">Skip</text>
    <text x="444" y="268" class="mono small ink">LINE 7</text><text x="630" y="268" class="sans small danger">Invalid</text>
    <rect x="444" y="338" width="118" height="38" class="btn" rx="6"/><text x="464" y="362" class="sans small" fill="#fff">Import 3</text>
  </g>

  <g transform="translate(64,1550)">
    <rect class="panel" width="800" height="420" rx="10"/>
    <text x="24" y="38" class="sans h3 ink">Audit Activity</text>
    <rect x="24" y="74" width="752" height="304" fill="#fbfcfa"/>
    <text x="48" y="112" class="sans tiny muted">ACTION</text><text x="208" y="112" class="sans tiny muted">TARGET</text><text x="394" y="112" class="sans tiny muted">ACTOR</text><text x="560" y="112" class="sans tiny muted">TIME</text>
    <line x1="48" y1="132" x2="736" y2="132" class="line"/>
    <text x="48" y="164" class="sans small ink">Copied</text><text x="208" y="164" class="mono small ink">DATABASE_URL</text><text x="394" y="164" class="sans small muted">local session</text><text x="560" y="164" class="sans small muted">2 min ago</text>
    <line x1="48" y1="184" x2="736" y2="184" class="line"/>
    <text x="48" y="216" class="sans small ink">Updated</text><text x="208" y="216" class="mono small ink">REDIS_URL</text><text x="394" y="216" class="sans small muted">you</text><text x="560" y="216" class="sans small muted">12 min ago</text>
    <line x1="48" y1="236" x2="736" y2="236" class="line"/>
    <text x="48" y="268" class="sans small ink">Imported</text><text x="208" y="268" class="mono small ink">4 keys</text><text x="394" y="268" class="sans small muted">you</text><text x="560" y="268" class="sans small muted">Today 10:21</text>
    <text x="48" y="334" class="sans small muted">Audit rows never include secret values.</text>
  </g>

  <g transform="translate(936,1550)">
    <rect class="panel" width="800" height="420" rx="10"/>
    <text x="24" y="38" class="sans h3 ink">Settings / Export Warning</text>
    <rect x="24" y="74" width="300" height="304" fill="#f0f4ef"/>
    <text x="48" y="116" class="sans small ink">Project settings</text>
    <text x="48" y="152" class="sans small muted">Vault storage</text>
    <text x="48" y="188" class="sans small muted">CLI token</text>
    <text x="48" y="224" class="sans small muted">Export &amp; backup</text>
    <rect x="360" y="86" width="380" height="250" class="yellowsoft" rx="8"/>
    <text x="388" y="130" class="sans h3 ink">Plaintext .env export</text>
    <text x="388" y="164" class="sans body muted">This file can expose secrets if pasted into issues, chat, logs, or screenshots.</text>
    <text x="388" y="210" class="sans body muted">Export is useful for local dev, but it is not encrypted backup.</text>
    <rect x="388" y="260" width="150" height="40" class="warn" rx="6"/><text x="414" y="286" class="sans small" fill="#fff">Export .env</text>
    <rect x="552" y="260" width="142" height="40" class="btn2" rx="6"/><text x="574" y="286" class="sans small ink">Cancel</text>
  </g>

  <g transform="translate(64,2030)">
    <rect class="panel" width="800" height="420" rx="10"/>
    <text x="24" y="38" class="sans h3 ink">Locked / Error State</text>
    <rect x="24" y="74" width="752" height="304" fill="#fbfcfa"/>
    <rect x="250" y="112" width="300" height="220" class="redsoft" rx="10"/>
    <text x="300" y="164" class="sans h2 ink">Vault locked</text>
    <text x="300" y="198" class="sans body muted">Unlock locally to view project secrets.</text>
    <rect x="300" y="232" width="140" height="40" class="btn" rx="6"/>
    <text x="326" y="258" class="sans small" fill="#fff">Unlock vault</text>
    <text x="300" y="306" class="sans small muted">Storage unavailable? Retry or restore encrypted backup.</text>
  </g>

  <g transform="translate(936,2030)">
    <rect class="panel" width="800" height="420" rx="10"/>
    <text x="24" y="38" class="sans h3 ink">Engineering Acceptance Snapshot</text>
    <text x="48" y="96" class="sans body ink">- Values masked by default in every state.</text>
    <text x="48" y="132" class="sans body ink">- Copy/reveal actions are explicit and auditable.</text>
    <text x="48" y="168" class="sans body ink">- Import preview shows conflicts before writing.</text>
    <text x="48" y="204" class="sans body ink">- Export warning appears before plaintext output.</text>
    <text x="48" y="240" class="sans body ink">- Locked/error state hides sensitive detail.</text>
    <text x="48" y="276" class="sans body ink">- Demo screenshots use fake keys and masked values.</text>
    <rect x="48" y="324" width="304" height="44" class="btn2" rx="7"/>
    <text x="70" y="352" class="sans body ink">Remaining CEO/PM decisions in handoff doc</text>
  </g>
</svg>
